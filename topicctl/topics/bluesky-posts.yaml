meta:
  name: bluesky-posts
  cluster: kafka-dev
  environment: dev
  region: us-east-1

spec:
  partitions: 3
  replicationFactor: 3
  placement:
    strategy: any
  settings:
    retention.ms: "604800000"      # 7 days
    retention.bytes: "2505397589"  # ~2.3 GB per partition (disk_size * 0.7 / 3 partitions)
    cleanup.policy: "delete"
    min.insync.replicas: "2"
