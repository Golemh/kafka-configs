# Promtail Configuration — Docker log scraper
#
# Discovers all containers on this host via the Docker socket and ships
# their logs to Loki. LOKI_ENDPOINT is injected at runtime from the
# docker-compose .env file (set by Terraform cloud-init).
#
# Started with: -config.expand-env=true so ${LOKI_ENDPOINT} is resolved.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_ENDPOINT}/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip the leading / from container names (e.g. /kafka → kafka)
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      # Label stdout vs stderr
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      # Compose service name (more stable than container name)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
